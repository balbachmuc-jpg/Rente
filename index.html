<!-- v2.2 Ruhestands-Countdown App -->

<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Die Uhr läuft</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top left,#ff4fd8 0%,transparent 30%),
radial-gradient(circle at bottom right,#7c4dff 0%,transparent 30%),
#081224;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

.phone{
width:100%;
max-width:520px;
margin:auto;
}

.card{
background:#d8dfbf;
border-radius:42px;
padding:24px 24px 30px;
overflow:hidden;
position:relative;
box-shadow:0 18px 55px rgba(0,0,0,.38);
width:100%;
}

.hero{
text-align:center;
color:#000;
}

.heroicon{
font-size:48px;
line-height:1;
}

.title{
font-size:24px;
line-height:.9;
font-weight:900;
margin-top:10px;
}

.counter{
font-size:112px;
line-height:.82;
font-weight:900;
letter-spacing:-4px;
margin-top:14px;
}

.sub{
font-size:22px;
line-height:1.15;
font-weight:900;
margin-top:12px;
}

.live{
margin-top:12px;
font-size:20px;
line-height:1.4;
}

.live strong{
display:block;
font-size:28px;
margin-top:6px;
}

.progress{
margin-top:12px;
font-size:28px;
font-weight:900;
}

.trackWrap{
position:relative;
width:100%;
max-width:360px;
height:760px;
margin:10px auto 0;
overflow:visible;
isolation:isolate;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:760px;
overflow:visible;
z-index:0;
}

.road{
fill:none;
stroke:#1c1f27;
stroke-width:22;
stroke-linecap:round;
filter:
drop-shadow(0 10px 16px rgba(0,0,0,.42));
}

.middle{
fill:none;
stroke:#ffffff;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:12 12;
opacity:.95;
}

.progressRoad{
fill:none;
stroke:#5dff95;
stroke-width:8;
stroke-linecap:round;
filter:
drop-shadow(0 0 4px #5dff95)
drop-shadow(0 0 12px #5dff95);
stroke-dasharray:3000;
stroke-dashoffset:3000;
transition:stroke-dashoffset 12s linear;
}

.flagStart,
.flagEnd{
position:absolute;
font-size:38px;
z-index:20;
}

.flagStart{
left:6px;
bottom:62px;
}

.flagEnd{
right:-13px;
top:2px;
}

.milestone{
position:absolute;
background:#ffd400;
border:4px solid #000;
border-radius:999px;
padding:8px 14px;
font-size:10px;
font-weight:900;
white-space:nowrap;
color:#000;
z-index:20;
box-shadow:
0 8px 18px rgba(0,0,0,.28);
}

.milestone::after{
content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
top:100%;
width:6px;
height:42px;
background:#7b7b7b;
border-radius:4px;
}

.m1{
left:18px;
bottom:128px;
}

.m2{
left:148px;
bottom:188px;
}

.m3{
right:64px;
bottom:286px;
}

.m4{
left:132px;
bottom:420px;
}

.m5{
right:28px;
bottom:533px;
}

.m6{
left:74px;
bottom:592px;
}

.m7{
right:70px;
bottom:639px;
}

.m8{
left:138px;
bottom:681px;
}

.m9{
right:-13px;
top:18px;
}

.footer{
margin-top:12px;
text-align:center;
font-size:18px;
line-height:1.35;
font-weight:800;
color:#000;
}

.badge{
margin-top:28px;
background:linear-gradient(90deg,#ff4fa3,#6b38ff);
color:#fff;
border-radius:999px;
padding:22px;
text-align:center;
font-size:22px;
font-weight:900;
box-shadow:
0 12px 24px rgba(124,77,255,.35);
}
/* Runner weicher + lebendiger */
#runner text{
transform-box:fill-box;
transform-origin:center;
animation:
runnerBounce 1.2s ease-in-out infinite,
runnerGlowPulse 2.4s ease-in-out infinite;

filter:
drop-shadow(0 0 10px white)
drop-shadow(0 0 22px #5dff95)
drop-shadow(0 0 34px #5dff95);
}

/* Leichtes Hüpfen */
@keyframes runnerBounce{

0%{
transform:
translateY(0px)
scale(1);
}

50%{
transform:
translateY(-2px)
scale(1.03);
}

100%{
transform:
translateY(0px)
scale(1);
}

}

/* Glow pulsieren */
@keyframes runnerGlowPulse{

0%{
filter:
drop-shadow(0 0 4px white)
drop-shadow(0 0 8px #5dff95);
}

50%{
filter:
drop-shadow(0 0 10px white)
drop-shadow(0 0 20px #5dff95);
}

100%{
filter:
drop-shadow(0 0 4px white)
drop-shadow(0 0 8px #5dff95);
}

}

/* Grüner Fortschritt lebt leicht */
.progressRoad{
animation:
roadPulse 3s ease-in-out infinite;
}

@keyframes roadPulse{

0%{
opacity:.82;
}

50%{
opacity:1;
}

100%{
opacity:.82;
}

}

/* Ziel erreicht Effekt */
.goalReached{

animation:
goalFlash 1s ease-in-out infinite;
}

@keyframes goalFlash{

0%{
transform:scale(1);
filter:
drop-shadow(0 0 4px gold);
}

50%{
transform:scale(1.18);
filter:
drop-shadow(0 0 18px gold);
}

100%{
transform:scale(1);
filter:
drop-shadow(0 0 4px gold);
}

}
/* Runner Party am Ziel */
/* Runner Party am Ziel */
#runnerEmoji.runnerParty{
animation:
runnerBounce .9s ease-in-out infinite,
runnerRoll 9.8s linear infinite,
runnerGlowPulse .8s ease-in-out infinite;

transform-origin:center;
display:inline-block;
font-size:46px;
}

@keyframes runnerRoll{

0%{
transform:
translateX(0px)
translateY(0px)
rotate(0deg);
}

20%{
transform:
translateX(2px)
translateY(-1px)
rotate(7deg);
}

40%{
transform:
translateX(5px)
translateY(0px)
rotate(14deg);
}

60%{
transform:
translateX(8px)
translateY(-1px)
rotate(21deg);
}

80%{
transform:
translateX(11px)
translateY(0px)
rotate(28deg);
}

100%{
transform:
translateX(14px)
translateY(-1px)
rotate(36deg);
}
}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<div class="phone">

<div class="card hero">

<div class="heroicon">🏖️</div>

<div class="title">
NUR<br>NOCH
</div>

<div class="counter" id="days">137</div>

<div class="sub">
verbleibende<br>
Arbeitstage,<br>
mal sehen, was dann kommt!
</div>

<div class="live">
und den Rest von heute:
<strong id="todayRest">23:59:59</strong>
</div>

<div class="progress" id="progressText">
98.686 % geschafft
</div>

<div class="trackWrap">

<div class="flagStart">🚩</div>
<div class="flagEnd">🏁</div>

<div class="milestone m1">1 RZdBW</div>
<div class="milestone m2">2 Rechenzentrale</div>
<div class="milestone m3">3 Vereinte</div>
<div class="milestone m4">4 Allianz</div>
<div class="milestone m5">5 Candle</div>
<div class="milestone m6">6 BMC</div>
<div class="milestone m7">7 Infosys</div>
<div class="milestone m8">8 NTT DATA</div>
<div class="milestone m9">9 Deloitte</div>

<svg viewBox="0 140 360 760">

<defs>

<filter id="runnerGlow">

<feGaussianBlur
stdDeviation="2"
result="coloredBlur"
/>

<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>

</filter>

</defs>

<path
id="roadPath"
class="road"
d="
M42 930

C78 910,120 900,170 885

S285 845,305 790

S285 720,205 690

S82 645,110 575

S245 520,300 455

S275 390,175 360

S70 315,105 250

S220 205,295 175

S330 120,338 48
"
/>

<path
id="progressPath"
class="progressRoad"
d="
M42 930

C78 910,120 900,170 885

S285 845,305 790

S285 720,205 690

S82 645,110 575

S245 520,300 455

S275 390,175 360

S70 315,105 250

S220 205,295 175

S330 120,338 48
"
/>

<path
class="middle"
d="
M42 930

C78 910,120 900,170 885

S285 845,305 790

S285 720,205 690

S82 645,110 575

S245 520,300 455

S275 390,175 360

S70 315,105 250

S220 205,295 175

S330 120,338 48
"
/>

<g
id="runner"
style="
transition: transform 12s linear;
transform-origin:center;
transform-box:fill-box;
"
transform="translate(42 930) rotate(0)"
filter="url(#runnerGlow)"
>
<text
id="runnerEmoji"
font-size="58"
text-anchor="middle"
dominant-baseline="middle"
>
🏃
</text>
</g>

</svg>

</div>

<div class="footer">
Seit 01.09.1979 unterwegs<br>
Richtung Ruhestand 😎
</div>

<div class="badge" id="badge">
Noch 228 Tage
</div>

</div>
</div>

<script>

const careerStart = new Date('1979-09-01');

const retirementDate = new Date('2026-12-30');

function workdaysRemaining(){

const end = new Date('2026-12-30');

const freeDays = new Set([

'2026-05-25',
'2026-06-01',
'2026-06-02',
'2026-06-03',
'2026-06-04',
'2026-06-05',
'2026-06-08',
'2026-06-29',

'2026-08-24',
'2026-08-25',
'2026-08-26',
'2026-08-27',
'2026-08-28',
'2026-08-31',

'2026-09-01',
'2026-09-02',
'2026-09-03',
'2026-09-04',
'2026-09-07',
'2026-09-08',
'2026-09-09',
'2026-09-10',
'2026-09-11',
'2026-09-14',

'2026-12-24',
'2026-12-25',
'2026-12-28',
'2026-12-29',
'2026-12-31'

]);

const today = new Date();

today.setHours(0,0,0,0);
end.setHours(0,0,0,0);

let count = 0;

const current = new Date(today);

current.setDate(current.getDate() + 1);

while(current <= end){

const day = current.getDay();

const yyyy = current.getFullYear();
const mm = String(current.getMonth()+1).padStart(2,'0');
const dd = String(current.getDate()).padStart(2,'0');

const dateString = `${yyyy}-${mm}-${dd}`;

const isWeekend =
day === 0 || day === 6;

const isFreeDay =
freeDays.has(dateString);

if(!isWeekend && !isFreeDay){
count++;
}

current.setDate(current.getDate() + 1);

}

return count;

}

function calculateCareerProgress(){

const today = new Date();

const total =
retirementDate - careerStart;

const done =
today - careerStart;

return Math.max(
0,
Math.min(100,(done/total)*100)
);

}

function pad(v){
return String(v).padStart(2,'0');
}

function updateTodayRest(){

const now = new Date();

const midnight = new Date();
midnight.setHours(24,0,0,0);

const diff = midnight - now;

const h = Math.floor(diff / 1000 / 60 / 60);
const m = Math.floor((diff / 1000 / 60) % 60);
const s = Math.floor((diff / 1000) % 60);

document.getElementById('todayRest').innerText =
pad(h)+':'+pad(m)+':'+pad(s);

}

function updateTrack(progress){

const path =
document.getElementById('roadPath');

const progressPath =
document.getElementById('progressPath');

const runner =
document.getElementById('runner');

const goal =
document.querySelector('.flagEnd');

const length =
path.getTotalLength();

/* Fortschritt Straße */
progressPath.style.strokeDasharray =
length;

progressPath.style.strokeDashoffset =
length - (length * progress / 100);

/* Position auf Strecke */
const currentLength =
length * progress / 100;

const point =
path.getPointAtLength(currentLength);

/* Punkt leicht davor für Richtung */
const ahead =
path.getPointAtLength(
Math.min(currentLength + 1,length)
);

/* Winkel berechnen */
const angle =
Math.atan2(
ahead.y - point.y,
ahead.x - point.x
) * 180 / Math.PI;

/* Runner exakt auf Straße */
runner.setAttribute(
'transform',
`translate(${point.x} ${point.y}) rotate(${angle}) scale(-1 1)`
);

/* Ziel erreicht */
if(progress >= 99.95){

goal.classList.add('goalReached');

document
.getElementById('runnerEmoji')
.classList.add('runnerParty');

document.getElementById('runnerEmoji').innerText = '🤓';

/* Konfetti immer wieder */
if(!window.confettiLoop){

window.confettiLoop = setInterval(()=>{

confetti({
particleCount:80,
spread:90,
origin:{ y:0.6 },
startVelocity:35
});

},2500);

}

}else{

goal.classList.remove('goalReached');

document.getElementById('runnerEmoji').innerText = '🏃';

document
.getElementById('runnerEmoji')
.classList.remove('runnerParty');

/* Konfetti stoppen */
clearInterval(window.confettiLoop);
window.confettiLoop = null;
}
}
function update(){

const progress =
calculateCareerProgress();

document.getElementById('days').innerText =
workdaysRemaining();

document.getElementById('badge').innerText =
'Noch ' +
Math.ceil(
(retirementDate - new Date())
/ 1000 / 60 / 60 / 24
) +
' Tage';

document.getElementById('progressText').innerText =
progress.toFixed(3) +
' % geschafft';

updateTodayRest();

updateTrack(progress);

}

setTimeout(()=>{

update();

},200);

updateTodayRest();

setInterval(updateTodayRest,1000);

setInterval(update,60000);

</script>

</body>
</html>
