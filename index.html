<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Uhr läuft</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top left,#ff4fd8 0%,transparent 30%),
radial-gradient(circle at bottom right,#7c4dff 0%,transparent 30%),
#081224;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

.phone{
width:100%;
max-width:520px;
margin:auto;
}

.card{
background:#d8dfbf;
border-radius:42px;
padding:24px 24px 30px;
overflow:hidden;
position:relative;
box-shadow:0 18px 55px rgba(0,0,0,.38);
width:100%;
}

.hero{
text-align:center;
color:#000;
}

.heroicon{
font-size:48px;
line-height:1;
}

.title{
font-size:24px;
line-height:.9;
font-weight:900;
margin-top:10px;
}

.counter{
font-size:112px;
line-height:.82;
font-weight:900;
letter-spacing:-4px;
margin-top:14px;
}

.sub{
font-size:22px;
line-height:1.15;
font-weight:900;
margin-top:12px;
}

.live{
margin-top:28px;
font-size:20px;
line-height:1.4;
}

.live strong{
display:block;
font-size:28px;
margin-top:6px;
}

.progress{
margin-top:34px;
font-size:28px;
font-weight:900;
}

.trackWrap{
position:relative;
width:100%;
max-width:360px;
height:980px;
margin:34px auto 0;
overflow:visible;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:980px;
overflow:visible;
z-index:1;
}

.road{
fill:none;
stroke:#1c1f27;
stroke-width:22;
stroke-linecap:round;
filter:
drop-shadow(0 10px 16px rgba(0,0,0,.42));
}

.middle{
fill:none;
stroke:#ffffff;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:12 12;
opacity:.95;
}

.progressRoad{
fill:none;
stroke:#5dff95;
stroke-width:8;
stroke-linecap:round;
filter:
drop-shadow(0 0 4px #5dff95)
drop-shadow(0 0 12px #5dff95);
stroke-dasharray:3000;
stroke-dashoffset:3000;
transition:stroke-dashoffset 1.5s ease;
}

.runner{
position:absolute;
font-size:30px;
z-index:50;
transform:translate(-50%,-50%);
pointer-events:none;
transition:left 1.5s ease, top 1.5s ease;
filter:
drop-shadow(0 0 8px white)
drop-shadow(0 0 16px #5dff95);
}

.flagStart,
.flagEnd{
position:absolute;
font-size:38px;
z-index:20;
}

.flagStart{
left:6px;
bottom:6px;
}

.flagEnd{
right:6px;
top:0;
}

.milestone{
position:absolute;
background:#ffd400;
border:4px solid #000;
border-radius:999px;
padding:8px 14px;
font-size:10px;
font-weight:900;
white-space:nowrap;
color:#000;
z-index:20;
box-shadow:
0 8px 18px rgba(0,0,0,.28);
}

.milestone::after{
content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
top:100%;
width:6px;
height:42px;
background:#7b7b7b;
border-radius:4px;
}

/* MARKER */

.m1{
left:18px;
bottom:18px;
}

.m2{
left:148px;
bottom:150px;
}

.m3{
right:64px;
bottom:286px;
}

.m4{
left:132px;
bottom:420px;
}

.m5{
right:28px;
bottom:552px;
}

.m6{
left:92px;
bottom:688px;
}

.m7{
right:18px;
bottom:818px;
}

.m8{
left:228px;
bottom:914px;
}

.m9{
right:6px;
top:12px;
}

.footer{
margin-top:12px;
text-align:center;
font-size:18px;
line-height:1.35;
font-weight:800;
color:#000;
}

.badge{
margin-top:28px;
background:linear-gradient(90deg,#ff4fa3,#6b38ff);
color:#fff;
border-radius:999px;
padding:22px;
text-align:center;
font-size:22px;
font-weight:900;
box-shadow:
0 12px 24px rgba(124,77,255,.35);
}

</style>
</head>

<body>

<div class="phone">

<div class="card hero">

<div class="heroicon">🏖️</div>

<div class="title">
NUR<br>NOCH
</div>

<div class="counter" id="days">137</div>

<div class="sub">
verbleibende<br>
Arbeitstage
</div>

<div class="live">
und den Rest von heute:
<strong id="todayRest">23:59:59</strong>
</div>

<div class="progress" id="progressText">
98.686 % geschafft
</div>

<div class="trackWrap">

<div class="flagStart">🚩</div>
<div class="flagEnd">🏁</div>

<div class="runner" id="runner">🏃</div>

<div class="milestone m1">1 RZdBW</div>
<div class="milestone m2">2 Rechenzentrale</div>
<div class="milestone m3">3 Vereinte</div>
<div class="milestone m4">4 Allianz</div>
<div class="milestone m5">5 Candle</div>
<div class="milestone m6">6 BMC</div>
<div class="milestone m7">7 Infosys</div>
<div class="milestone m8">8 NTT DATA</div>
<div class="milestone m9">9 Deloitte</div>

<svg viewBox="0 0 360 980">

<!-- HAUPTSTRASSE -->

<path
id="roadPath"
class="road"
d="
M32 930

C80 930,150 920,215 900

S325 850,302 785

S180 730,105 680

S110 605,205 565

S325 520,300 455

S165 400,82 350

S95 275,205 235

S330 190,330 110

S335 60,345 42
"
/>

<!-- FORTSCHRITT -->

<path
id="progressPath"
class="progressRoad"
d="
M32 930

C80 930,150 920,215 900

S325 850,302 785

S180 730,105 680

S110 605,205 565

S325 520,300 455

S165 400,82 350

S95 275,205 235

S330 190,330 110

S335 60,345 42
"
/>

<!-- MITTELLINIE -->

<path
class="middle"
d="
M32 930

C80 930,150 920,215 900

S325 850,302 785

S180 730,105 680

S110 605,205 565

S325 520,300 455

S165 400,82 350

S330 190,330 110

S335 60,345 42
"
/>

</svg>

</div>

<div class="footer">
Seit 01.09.1979 unterwegs<br>
Richtung Ruhestand 😎
</div>

<div class="badge" id="badge">
Noch 228 Tage
</div>

</div>
</div>

<script>

const careerStart = new Date('1979-09-01');
const retirementDate = new Date('2026-12-30');

function workdaysRemaining(){

const end = new Date('2026-12-30');

const freeDays = new Set([

'2026-05-25',
'2026-06-04',
'2026-12-24',
'2026-12-25',
'2026-12-31',

'2026-06-01',
'2026-06-02',
'2026-06-03',
'2026-06-05',
'2026-06-08',
'2026-06-29',

'2026-08-24',
'2026-08-25',
'2026-08-26',
'2026-08-27',
'2026-08-28',
'2026-08-31',

'2026-09-01',
'2026-09-02',
'2026-09-03',
'2026-09-04',
'2026-09-07',
'2026-09-08',
'2026-09-09',
'2026-09-10',
'2026-09-11',
'2026-09-14',

'2026-12-28',
'2026-12-29'

]);

const today = new Date();

today.setHours(0,0,0,0);
end.setHours(0,0,0,0);

let count = 0;

const current = new Date(today);

current.setDate(current.getDate() + 1);

while(current <= end){

const day = current.getDay();

const yyyy = current.getFullYear();
const mm = String(current.getMonth()+1).padStart(2,'0');
const dd = String(current.getDate()).padStart(2,'0');

const dateString = `${yyyy}-${mm}-${dd}`;

const isWeekend =
day === 0 || day === 6;

const isFreeDay =
freeDays.has(dateString);

if(!isWeekend && !isFreeDay){
count++;
}

current.setDate(current.getDate() + 1);
}

return count;
}

function calculateCareerProgress(){

const today = new Date();

const total =
retirementDate - careerStart;

const done =
today - careerStart;

return Math.max(
0,
Math.min(100,(done/total)*100)
);

}

function pad(v){
return String(v).padStart(2,'0');
}

function updateTodayRest(){

const now = new Date();

const midnight = new Date();
midnight.setHours(24,0,0,0);

const diff = midnight - now;

const h = Math.floor(diff / 1000 / 60 / 60);
const m = Math.floor((diff / 1000 / 60) % 60);
const s = Math.floor((diff / 1000) % 60);

document.getElementById('todayRest').innerText =
pad(h)+':'+pad(m)+':'+pad(s);

}

function updateTrack(progress){

const path =
document.getElementById('roadPath');

const progressPath =
document.getElementById('progressPath');

const runner =
document.getElementById('runner');

const length =
path.getTotalLength();

progressPath.style.strokeDasharray =
length;

progressPath.style.strokeDashoffset =
length - (length * progress / 100);

const point =
path.getPointAtLength(
length * progress / 100
);

runner.style.left =
point.x + 'px';

runner.style.top =
point.y + 'px';

}

function update(){

const progress =
calculateCareerProgress();

document.getElementById('days').innerText =
workdaysRemaining();

document.getElementById('badge').innerText =
'Noch ' +
Math.ceil(
(retirementDate - new Date())
/ 1000 / 60 / 60 / 24
) +
' Tage';

document.getElementById('progressText').innerText =
progress.toFixed(3) +
' % geschafft';

updateTodayRest();
updateTrack(progress);

}

update();

setInterval(updateTodayRest,1000);

setInterval(update,60000);

</script>

</body>
</html>
