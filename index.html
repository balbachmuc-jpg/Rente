<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Uhuhr läuft</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top left,#ff4fd8 0%,transparent 30%),
radial-gradient(circle at bottom right,#7c4dff 0%,transparent 30%),
#081224;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

.phone{
width:100%;
max-width:430px;
}

.card{
background:#dce8bf;
border-radius:38px;
padding:18px 14px 20px;
overflow:hidden;
position:relative;
box-shadow:0 15px 50px rgba(0,0,0,.35);
}

.hero{
text-align:center;
color:#000;
}

.heroicon{
font-size:54px;
}

.title{
font-size:56px;
line-height:.88;
font-weight:900;
margin-top:8px;
}

.counter{
font-size:120px;
line-height:.9;
font-weight:900;
margin-top:14px;
}

.sub{
font-size:24px;
font-weight:800;
margin-top:8px;
}

.live{
margin-top:16px;
font-size:18px;
}

.progress{
margin-top:14px;
font-size:22px;
font-weight:900;
}
.trackWrap{
position:relative;
height:620px;
width:360px;
margin:60px auto 0;
overflow:hidden;
}

svg{
position:absolute;
top:0;
left:0;
width:360px;
height:620px;
overflow:hidden;
shape-rendering:geometricPrecision;
}

.road{
fill:none;
stroke:#1b1b22;
stroke-width:36;
stroke-linecap:round;
filter:drop-shadow(0 8px 16px rgba(0,0,0,.35));
}

.middle{
fill:none;
stroke:#fff;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:12 12;
opacity:.9;
}

.progressRoad{
fill:none;
stroke:#36ff7d;
stroke-width:8;
stroke-linecap:round;
filter:drop-shadow(0 0 8px #36ff7d);
stroke-dasharray:2000;
stroke-dashoffset:2000;
}
.progressRoad{
transition:stroke-dashoffset 1.5s ease;
}
.runner{
position:absolute;
left:40px;
top:520px;
font-size:42px;
z-index:9999;
filter:drop-shadow(0 0 8px white);
pointer-events:none;
transform:translate(-50%,-50%);
opacity:0;
transition:left 1.5s ease, top 1.5s ease;
}
.runner{
will-change:left, top;
}

.flagStart,.flagEnd{
position:absolute;
font-size:38px;
z-index:20;
}

.flagStart{
left:0;
bottom:8px;
}

.flagEnd{
right:4px;
top:0;
}

.milestone{
position:absolute;
background:#ffd400;
border:4px solid #000;
border-radius:14px;
padding:8px 12px;
font-weight:800;
font-size:14px;
color:#000;
box-shadow:0 6px 14px rgba(0,0,0,.25);
z-index:20;
}

.milestone::after{
content:"";
position:absolute;
width:5px;
height:38px;
background:#666;
left:50%;
transform:translateX(-50%);
top:100%;
border-radius:4px;
}

.m1{ left:9px; bottom:26px; }
.m2{ right:10px; bottom:96px; }
.m3{ right:72px; bottom:180px; }
.m4{ right:18px; bottom:278px; }
.m5{ left:24px; bottom:300px; }
.m6{ left:58px; bottom:390px; }
.m7{ right:28px; bottom:450px; }
.m8{ left:95px; bottom:445px; }
.m9{ right:15px; top:20px; }

.bottomLine{
margin-top:10px;
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:800;
color:#000;
}

.footer{
margin-top:14px;
text-align:center;
color:#000;
font-size:18px;
line-height:1.35;
font-weight:700;
}

.badge{
margin-top:22px;
background:linear-gradient(90deg,#ff4fa3,#6b38ff);
color:#fff;
border-radius:999px;
padding:22px;
text-align:center;
font-size:24px;
font-weight:900;
box-shadow:0 10px 24px rgba(124,77,255,.35);
}
</style>
</head>

<body>

<div class="phone">
<div class="card hero">

<div class="heroicon"></div>

<div class="title">
NUR<br>NOCH
</div>

<div class="counter" id="days">138</div>

<div class="sub">verbleibende Arbeitstage</div>

<div class="live" id="todayRest"></div>

<div class="progress" id="progressText"></div>

<div class="trackWrap">

<div class="flagStart"></div>
<div class="flagEnd"></div>

<div class="runner" id="runner"></div>

<div class="milestone m1">1 RZdBW</div>
<div class="milestone m2">2 Rechenzentrale</div>
<div class="milestone m3">3 Vereinte</div>
<div class="milestone m4">4 Allianz</div>
<div class="milestone m5">5 Candle</div>
<div class="milestone m6">6 BMC</div>
<div class="milestone m7">7 Infosys</div>
<div class="milestone m8">8 NTT DATA</div>
<div class="milestone m9">9 Deloitte</div>
<svg viewBox="0 0 360 620">

<path id="roadPath" class="road" d="
M40 580
C90 580,90 520,150 520
S290 560,300 470
S200 390,120 430
S40 320,120 260
S300 290,300 170
S210 80,170 110
S250 80,320 20
"/>

<path id="progressPath" class="progressRoad" d="
M40 580
C90 580,90 520,150 520
S290 560,300 470
S200 390,120 430
S40 320,120 260
S300 290,300 170
S210 80,170 110
S250 80,320 20
"/>

<path class="middle" d="
M40 580
C90 580,90 520,150 520
S290 560,300 470
S200 390,120 430
S40 320,120 260
S300 290,300 170
S210 80,170 110
S250 80,320 20
"/>
</svg>
</div>

<div class="footer">
Seit 01.09.1979 unterwegs Richtung Ruhestand 
</div>

<div class="badge" id="badge">
Noch 229 Tage
</div>

</div>
</div>

<script>
const careerStart = new Date('1979-09-01');
const retirementDate = new Date('2026-12-30');

function workdaysRemaining(){

  const end = new Date('2026-12-30');

  const freeDays = new Set([

    '2026-05-25',
    '2026-06-04',
    '2026-12-24',
    '2026-12-25',
    '2026-12-31',

    '2026-06-01',
    '2026-06-02',
    '2026-06-03',
    '2026-06-05',
    '2026-06-08',
    '2026-06-29',

    '2026-08-24',
    '2026-08-25',
    '2026-08-26',
    '2026-08-27',
    '2026-08-28',
    '2026-08-31',

    '2026-09-01',
    '2026-09-02',
    '2026-09-03',
    '2026-09-04',
    '2026-09-07',
    '2026-09-08',
    '2026-09-09',
    '2026-09-10',
    '2026-09-11',
    '2026-09-14',

    '2026-12-28',
    '2026-12-29'

  ]);

  const today = new Date();

  today.setHours(0,0,0,0);
  end.setHours(0,0,0,0);

  let count = 0;

  const current = new Date(today);

  current.setDate(current.getDate() + 1);

  while(current <= end){

    const day = current.getDay();

    const yyyy = current.getFullYear();
const mm = String(current.getMonth()+1).padStart(2,'0');
const dd = String(current.getDate()).padStart(2,'0');

const dateString = `${yyyy}-${mm}-${dd}`;

    const isWeekend =
      day === 0 || day === 6;

    const isFreeDay =
      freeDays.has(dateString);

    if(!isWeekend && !isFreeDay){
      count++;
    }

    current.setDate(current.getDate() + 1);
  }

  return count;
}
function calculateCareerProgress(){

const today = new Date();
const total = retirementDate - careerStart;
const done = today - careerStart;
return Math.max(0,Math.min(100,(done/total)*100));
}


function pad(v){
return String(v).padStart(2,'0');
}

function updateTodayRest(){
const now = new Date();
const midnight = new Date();
midnight.setHours(24,0,0,0);

const diff = midnight - now;

const h = Math.floor(diff / 1000 / 60 / 60);
const m = Math.floor((diff / 1000 / 60) % 60);
const s = Math.floor((diff / 1000) % 60);

document.getElementById('todayRest').innerText =
'Rest von heute: ' + pad(h)+':'+pad(m)+':'+pad(s);
}

function updateTrack(progress){
const path = document.getElementById('roadPath');
const progressPath = document.getElementById('progressPath');
const runner = document.getElementById('runner');

const length = path.getTotalLength();

progressPath.style.strokeDasharray = length;
progressPath.style.strokeDashoffset =
length - (length * progress / 100);

const point = path.getPointAtLength(length * progress / 100);

runner.style.opacity = 1;
runner.style.left = point.x + 'px';
runner.style.top = point.y + 'px';
}
function update(){

const progress = calculateCareerProgress();

document.getElementById('days').innerText =
workdaysRemaining();
document.getElementById('badge').innerText =
'Noch ' +
Math.ceil((retirementDate - new Date()) / 1000 / 60 / 60 / 24) +
' Tage';

document.getElementById('progressText').innerText =
progress.toFixed(3) + ' % geschafft';

updateTodayRest();
updateTrack(progress);
}

update();
setInterval(updateTodayRest,1000);
setInterval(update,60000);
</script>

</body>
</html>
