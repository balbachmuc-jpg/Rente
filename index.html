<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Die Uhr läuft</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top left,#ff4fd8 0%,transparent 28%),
radial-gradient(circle at bottom right,#7c4dff 0%,transparent 30%),
#081224;
min-height:100vh;
display:flex;
justify-content:center;
padding:18px;
}

.phone{
width:100%;
max-width:520px;
margin:auto;
}

.card{
background:#d7e1bc;
border-radius:42px;
padding:24px 22px 28px;
overflow:hidden;
position:relative;
box-shadow:
0 20px 60px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.4);
}

.hero{
text-align:center;
color:#000;
}

.heroicon{
font-size:46px;
}

.title{
font-size:22px;
line-height:.9;
font-weight:900;
margin-top:10px;
letter-spacing:-1px;
}

.counter{
font-size:96px;
line-height:.86;
font-weight:900;
margin-top:12px;
letter-spacing:-5px;
}

.sub{
font-size:20px;
font-weight:800;
margin-top:10px;
line-height:1.2;
}

.live{
margin-top:26px;
font-size:18px;
line-height:1.35;
}

.liveTime{
font-size:22px;
font-weight:800;
margin-top:4px;
}

.progress{
margin-top:28px;
font-size:22px;
font-weight:900;
}

.trackWrap{
position:relative;
height:760px;
width:100%;
max-width:420px;
margin:40px auto 0;
overflow:visible;
}

svg{
position:absolute;
inset:0;
width:100%;
height:760px;
overflow:visible;
}

.road{
fill:none;
stroke:#1a1d24;
stroke-width:30;
stroke-linecap:round;
stroke-linejoin:round;
filter:
drop-shadow(0 8px 14px rgba(0,0,0,.35));
}

.progressRoad{
fill:none;
stroke:#57ff9b;
stroke-width:9;
stroke-linecap:round;
stroke-linejoin:round;
filter:
drop-shadow(0 0 5px #57ff9b)
drop-shadow(0 0 10px rgba(87,255,155,.45));
stroke-dasharray:3000;
stroke-dashoffset:3000;
transition:stroke-dashoffset 1.2s ease;
}

.middle{
fill:none;
stroke:#fff;
stroke-width:5;
stroke-linecap:round;
stroke-dasharray:18 14;
opacity:.95;
}

.runner{
position:absolute;
font-size:28px;
z-index:40;
transform:translate(-50%,-50%);
transition:left 1.2s ease,top 1.2s ease;
pointer-events:none;
filter:
drop-shadow(0 0 6px rgba(255,255,255,.9));
}

.flagStart,
.flagEnd{
position:absolute;
font-size:40px;
z-index:20;
}

.flagStart{
left:4px;
bottom:10px;
}

.flagEnd{
right:8px;
top:8px;
}

.milestone{
position:absolute;
background:#ffd400;
border:5px solid #000;
border-radius:999px;
padding:7px 14px;
font-weight:900;
font-size:12px;
color:#000;
box-shadow:
0 10px 18px rgba(0,0,0,.22);
z-index:30;
white-space:nowrap;
}

.milestone::after{
content:"";
position:absolute;
width:7px;
height:34px;
background:#777;
left:50%;
transform:translateX(-50%);
top:100%;
border-radius:10px;
}

.m1{ left:10px; bottom:18px; }
.m2{ left:122px; bottom:132px; }
.m3{ right:82px; bottom:224px; }
.m4{ right:34px; bottom:336px; }
.m5{ left:38px; bottom:432px; }
.m6{ left:26px; bottom:560px; }
.m7{ right:112px; bottom:618px; }
.m8{ right:10px; bottom:666px; }
.m9{ right:20px; top:18px; }

.footer{
margin-top:18px;
text-align:center;
font-size:16px;
line-height:1.4;
font-weight:800;
color:#111;
}

.badge{
margin-top:24px;
background:linear-gradient(90deg,#ff4fa3,#6d36ff);
color:#fff;
border-radius:999px;
padding:22px;
text-align:center;
font-size:22px;
font-weight:900;
box-shadow:
0 14px 28px rgba(109,54,255,.35);
}

</style>
</head>

<body>

<div class="phone">
<div class="card hero">

<div class="heroicon">🏖️</div>

<div class="title">
NUR<br>NOCH
</div>

<div class="counter" id="days">135</div>

<div class="sub">
verbleibende<br>Arbeitstage
</div>

<div class="live">
und den Rest von heute:
<div class="liveTime" id="todayRest">00:00:00</div>
</div>

<div class="progress" id="progressText">
98.686 % geschafft
</div>

<div class="trackWrap">

<div class="flagStart">🚩</div>
<div class="flagEnd">🏁</div>
<div class="runner" id="runner">🏃</div>

<div class="milestone m1">1 RZdBW</div>
<div class="milestone m2">2 Rechenzentrale</div>
<div class="milestone m3">3 Vereinte</div>
<div class="milestone m4">4 Allianz</div>
<div class="milestone m5">5 Candle</div>
<div class="milestone m6">6 BMC</div>
<div class="milestone m7">7 Infosys</div>
<div class="milestone m8">8 NTT DATA</div>
<div class="milestone m9">9 Deloitte</div>

<svg viewBox="0 0 420 760">

<path
id="roadPath"
class="road"
d="
M55 706

C88 682,118 660,150 636

S214 590,244 560

S308 498,310 430

S272 350,214 350

S126 376,126 446

S186 510,264 490

S336 442,350 350

S360 170,360 54
"
/>

<path
id="progressPath"
class="progressRoad"
d="
M55 706

C88 682,118 660,150 636

S214 590,244 560

S308 498,310 430

S272 350,214 350

S126 376,126 446

S186 510,264 490

S336 442,350 350

S360 170,360 54
"
/>

<path
class="middle"
d="
M55 706

C88 682,118 660,150 636

S214 590,244 560

S308 498,310 430

S272 350,214 350

S126 376,126 446

S186 510,264 490

S336 442,350 350

S360 170,360 54
"
/>

</svg>
</div>

<div class="footer">
Seit 01.09.1979 unterwegs<br>
Richtung Ruhestand 😎
</div>

<div class="badge" id="badge">
Noch 228 Tage
</div>

</div>
</div>

<script>

const careerStart = new Date('1979-09-01');
const retirementDate = new Date('2026-12-30');

function workdaysRemaining(){

const end = new Date('2026-12-30');

const freeDays = new Set([

'2026-05-25',
'2026-06-04',
'2026-12-24',
'2026-12-25',
'2026-12-31',

'2026-06-01',
'2026-06-02',
'2026-06-03',
'2026-06-05',
'2026-06-08',
'2026-06-29',

'2026-08-24',
'2026-08-25',
'2026-08-26',
'2026-08-27',
'2026-08-28',
'2026-08-31',

'2026-09-01',
'2026-09-02',
'2026-09-03',
'2026-09-04',
'2026-09-07',
'2026-09-08',
'2026-09-09',
'2026-09-10',
'2026-09-11',
'2026-09-14',

'2026-12-28',
'2026-12-29'

]);

const today = new Date();

today.setHours(0,0,0,0);
end.setHours(0,0,0,0);

let count = 0;

const current = new Date(today);
current.setDate(current.getDate() + 1);

while(current <= end){

const day = current.getDay();

const yyyy = current.getFullYear();
const mm = String(current.getMonth()+1).padStart(2,'0');
const dd = String(current.getDate()).padStart(2,'0');

const dateString = `${yyyy}-${mm}-${dd}`;

const isWeekend = day === 0 || day === 6;
const isFreeDay = freeDays.has(dateString);

if(!isWeekend && !isFreeDay){
count++;
}

current.setDate(current.getDate() + 1);
}

return count;
}

function calculateCareerProgress(){

const today = new Date();
const total = retirementDate - careerStart;
const done = today - careerStart;

return Math.max(
0,
Math.min(100,(done / total) * 100)
);
}

function pad(v){
return String(v).padStart(2,'0');
}

function updateTodayRest(){

const now = new Date();

const midnight = new Date();
midnight.setHours(24,0,0,0);

const diff = midnight - now;

const h = Math.floor(diff / 1000 / 60 / 60);
const m = Math.floor((diff / 1000 / 60) % 60);
const s = Math.floor((diff / 1000) % 60);

document.getElementById('todayRest').innerText =
pad(h)+':'+pad(m)+':'+pad(s);
}

function updateTrack(progress){

const path = document.getElementById('roadPath');
const progressPath = document.getElementById('progressPath');
const runner = document.getElementById('runner');

const length = path.getTotalLength();

progressPath.style.strokeDasharray = length;

progressPath.style.strokeDashoffset =
length - (length * progress / 100);

const point = path.getPointAtLength(
length * progress / 100
);

runner.style.left = point.x + 'px';
runner.style.top = point.y + 'px';
}

function update(){

const progress = calculateCareerProgress();

document.getElementById('days').innerText =
workdaysRemaining();

document.getElementById('badge').innerText =
'Noch ' +
Math.ceil(
(retirementDate - new Date())
/ 1000 / 60 / 60 / 24
) +
' Tage';

document.getElementById('progressText').innerText =
progress.toFixed(3) + ' % geschafft';

updateTodayRest();
updateTrack(progress);
}

update();

setInterval(updateTodayRest,1000);
setInterval(update,60000);

</script>

</body>
</html>
